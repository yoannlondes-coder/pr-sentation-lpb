<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<title>La Planète Bois — Présentation commerciale</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#0c0a09;--bg2:#16120f;--panel:#141110;
  --card:#f7f1e8;--card2:#ece1d1;
  --text:#201913;--muted:#6a6157;
  --accent:#B87333;--accent2:#d4955a;--accent-dark:#8a5525;
  --line:#e2d8ca;--white:#fffdf9;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);font-family:'Lato',system-ui,sans-serif}
body{color:#fff;background:radial-gradient(circle at top left,#1b1612 0%,var(--bg) 45%,#0c0c0c 100%)}
.app{max-width:1520px;margin:0 auto;padding:16px 24px 20px}

/* TOP BAR */
.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-logo{height:48px;width:auto;filter:brightness(1.1)}
.topbar-text .kicker{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);font-weight:700}
.topbar-text h1{margin:2px 0 0;font-size:32px;letter-spacing:-.03em;font-family:'Cormorant Garamond',serif;font-weight:700}
.topdesc{color:#9a8e82;font-size:13px;text-align:right}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;gap:14px}

/* SIDEBAR */
.sidebar{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:14px;position:sticky;top:14px;height:fit-content;backdrop-filter:blur(8px);max-height:calc(100vh - 36px);overflow-y:auto}
.sidehead{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:700}
.navbtn{width:100%;text-align:left;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.025);color:#f5f5f4;cursor:pointer;margin-bottom:4px;font-size:12.5px;font-family:'Lato',sans-serif;transition:.2s;display:flex;align-items:center;gap:8px}
.navbtn:hover{background:rgba(255,255,255,.07)}
.navbtn.active{background:linear-gradient(180deg,var(--accent2),var(--accent));border-color:#e7c084;color:#20170f;font-weight:700;box-shadow:0 6px 16px rgba(184,115,51,.22)}
.navnum{font-size:9px;font-weight:700;opacity:.5;min-width:16px}
.navbtn.active .navnum{opacity:.8}
.help{margin-top:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px;color:#ddd6cc;font-size:12px;line-height:1.5}

/* VIEWER */
.viewer{min-height:78vh;background:linear-gradient(135deg,var(--card),var(--card2));border-radius:24px;overflow:hidden;border:1px solid #2a2622;box-shadow:0 16px 60px rgba(0,0,0,.3);position:relative}
.slide{width:100%;min-height:78vh;display:grid}
.pad{padding:40px 44px}

/* TYPOGRAPHY IN VIEWER */
.eyebrow{display:inline-block;background:#f6e7cd;color:var(--accent-dark);padding:6px 11px;border-radius:999px;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.title{margin:14px 0 0;font-size:44px;line-height:1.05;color:var(--text);letter-spacing:-.03em;font-family:'Cormorant Garamond',serif;font-weight:700}
.subtitle{margin-top:10px;font-size:17px;line-height:1.4;color:var(--muted)}
.body{margin-top:12px;font-size:16px;line-height:1.5;color:#3b342d}

/* HERO */
.hero{grid-template-columns:1fr;position:relative}
.hero .bg{position:absolute;inset:0}
.hero .bg img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.4) saturate(.85)}
.hero .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,10,9,.3) 0%,rgba(12,10,9,.15) 40%,rgba(12,10,9,.5) 100%)}
.hero .content{position:relative;z-index:2;color:white;padding:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:78vh}
.hero .content .title{color:white;font-size:56px;letter-spacing:.02em}
.hero .content .subtitle{color:rgba(255,255,255,.7);font-size:20px;letter-spacing:.12em;text-transform:uppercase;font-weight:300}
.hero .content .body{color:rgba(255,255,255,.55);font-size:15px;max-width:600px}
.hero .hero-logo{height:90px;width:auto;margin-bottom:28px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.4))}
.hero .hero-line{width:60px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));margin:20px auto;border-radius:2px}
.hero .hero-badges{display:flex;gap:24px;margin-top:32px;flex-wrap:wrap;justify-content:center}
.hero .hero-badge{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:100px}
.hero .hero-badge .hb-icon{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center}
.hero .hero-badge .hb-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.hero .hero-badge .hb-label{font-size:11px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.04em;text-align:center}
.hero .hero-mention{margin-top:36px;font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.06em}

/* THREEPOINTS */
.threepoints{grid-template-columns:1.05fr .95fr}
.threepoints .left{display:flex;flex-direction:column;justify-content:center}
.threepoints .imagewrap{position:relative;height:100%;cursor:pointer}
.threepoints .imagewrap img{width:100%;height:100%;object-fit:cover}
.threegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}

/* POINTCARD — cliquable */
.pointcard{background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 4px 16px rgba(34,25,19,.04);cursor:pointer;transition:all .3s;overflow:hidden}
.pointcard:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(34,25,19,.08)}
.pointcard h3{margin:0 0 5px;font-size:15.5px;color:var(--text);font-family:'Cormorant Garamond',serif}
.pointcard p{margin:0;color:var(--muted);font-size:13px;line-height:1.45}
.pointcard .detail{max-height:0;overflow:hidden;transition:max-height .4s;font-size:12px;color:#5a5047;line-height:1.55}
.pointcard.open .detail{max-height:300px;margin-top:8px}
.pointcard .expand-hint{font-size:10px;color:var(--accent);margin-top:6px;font-weight:700}
.pointcard.open .expand-hint{display:none}
/* METIERS 4 COLONNES */
.metiers4-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 36px 24px}
.metier-col{background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s}
.metier-col:hover{transform:translateY(-4px);box-shadow:0 12px 28px rgba(34,25,19,.1)}
.metier-col img{width:100%;height:180px;object-fit:cover;display:block;transition:transform .4s}
.metier-col:hover img{transform:scale(1.04)}
.metier-col .metier-body{padding:14px 16px}
.metier-col .metier-body h3{margin:0 0 4px;font-size:17px;color:var(--text);font-family:'Cormorant Garamond',serif;font-weight:700}
.metier-col .metier-body p{margin:0;font-size:12px;color:var(--muted);line-height:1.45}
.metier-col .metier-detail{max-height:0;overflow:hidden;transition:max-height .4s;font-size:11.5px;color:#5a5047;line-height:1.5;margin-top:0;border-top:0 solid var(--line)}
.metier-col.open .metier-detail{max-height:200px;margin-top:8px;padding-top:8px;border-top-width:1px}

.point-img-preview img{width:100%;height:auto;border-radius:10px;border:1px solid var(--line);margin-top:8px;cursor:zoom-in;transition:transform .3s,box-shadow .3s}
.point-img-preview img:hover{transform:scale(1.02);box-shadow:0 6px 18px rgba(34,25,19,.1)}

/* GALLERIES */
.gallery4 .head,.gallery3 .head,.gallery2 .head,.gallery6 .head,.materials .head,.process-grid .head,.contact .head,.info-slide .head{padding:28px 36px 14px}
.gallerygrid4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:10px;padding:0 36px 32px}
.gallerygrid3{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:10px;padding:0 36px 32px}
.gallerygrid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 36px 32px}
.gallerygrid6{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:10px;padding:0 36px 32px}
.gallerygrid5{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:0 36px 32px}
.galleryitem{position:relative;border-radius:18px;overflow:hidden;min-height:220px;background:#ddd;border:1px solid rgba(0,0,0,.04);box-shadow:0 6px 18px rgba(34,25,19,.05);cursor:zoom-in;transition:transform .3s}
.galleryitem:hover{transform:scale(1.012)}
.galleryitem img{width:100%;height:100%;object-fit:cover;display:block}
.grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.18),rgba(0,0,0,0));pointer-events:none}
.img-caption{position:absolute;bottom:10px;left:12px;color:#fff;font-size:11px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.galleryitem:hover .img-caption{opacity:1}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.chip{padding:6px 10px;border-radius:999px;background:white;border:1px solid var(--line);font-size:11px;color:#4c443b}

/* MATERIALS INSIDE TERRASSE */
.matgrid-inline{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:16px;padding:0 36px 8px}
.matcard-sm{background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .3s}
.matcard-sm:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(34,25,19,.08)}
.matcard-sm img{width:100%;height:110px;object-fit:cover;display:block}
.matcard-sm .matmeta{padding:8px 10px}
.matcard-sm h3{margin:0;color:var(--text);font-size:13px;font-family:'Cormorant Garamond',serif}

/* CONFIG TERRASSE */
.config-section{padding:0 36px 20px}
.config-title{font-size:20px;font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.config-title::before{content:'';width:24px;height:2px;background:var(--accent);border-radius:2px}
.config-steps{display:flex;flex-direction:column;gap:10px}
.config-step{background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:16px;cursor:pointer;transition:all .3s;overflow:hidden;display:grid;grid-template-columns:1fr;align-items:stretch}
.config-step:hover{background:rgba(255,255,255,.85)}
.config-step.has-images{grid-template-columns:1fr auto}
.config-step-left{padding:16px 18px;display:flex;flex-direction:column;justify-content:center}
.config-step-header{display:flex;align-items:center;gap:12px}
.config-step-num{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.config-step-info{flex:1}
.config-step-info h3{margin:0;font-size:15px;color:var(--text);font-family:'Cormorant Garamond',serif;font-weight:700}
.config-step-info p{margin:2px 0 0;font-size:12px;color:var(--muted);line-height:1.4}
.config-step-arrow{font-size:14px;color:var(--accent);transition:transform .3s;font-weight:700}
.config-step.open .config-step-arrow{transform:rotate(90deg)}
.config-expand{grid-template-columns:1fr!important}
.config-options{max-height:0;overflow:hidden;transition:max-height .5s;display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:0}
.config-step.open .config-options{max-height:600px;margin-top:14px}
.config-opt{background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:12px;overflow:hidden;text-align:center;transition:all .3s}
.config-opt:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(34,25,19,.06)}
.config-opt img{width:100%;height:180px;object-fit:cover;display:block;cursor:zoom-in}
.config-opt .opt-name{font-size:12.5px;font-weight:700;color:var(--text);padding:6px 8px 2px;font-family:'Cormorant Garamond',serif}
.config-opt .opt-tag{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:0 8px 6px}
.config-opt .opt-detail{font-size:10.5px;color:var(--muted);line-height:1.4;padding:0 8px 8px;display:none}
.config-step.open .config-opt .opt-detail{display:block}
.config-opt.selected{border:2px solid var(--accent);background:rgba(184,115,51,.08);box-shadow:0 4px 16px rgba(184,115,51,.15)}
.config-opt.selected::after{content:'✓';position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:700}
.config-opt{position:relative}

/* TOGGLE OUI/NON */
.config-toggle{display:flex;gap:10px;align-items:center;max-height:0;overflow:hidden;transition:max-height .5s;margin-top:0}
.config-step.open .config-toggle{max-height:200px;margin-top:14px}
.config-toggle-img{width:120px;height:80px;object-fit:cover;border-radius:10px;border:1px solid var(--line);cursor:zoom-in;flex-shrink:0}
.toggle-btns{display:flex;gap:8px}
.toggle-btn{padding:10px 28px;border-radius:12px;border:2px solid var(--line);background:rgba(255,255,255,.8);cursor:pointer;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;color:var(--text);transition:all .3s}
.toggle-btn:hover{border-color:var(--accent);background:rgba(184,115,51,.05)}
.toggle-btn.selected{border-color:var(--accent);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}

/* CONFIG TEXT */
.config-textarea{max-height:0;overflow:hidden;transition:max-height .5s;margin-top:0}
.config-step.open .config-textarea{max-height:200px;margin-top:14px}
.config-textarea textarea{width:100%;height:100px;border:1px solid var(--line);border-radius:12px;padding:12px;font-family:'Lato',sans-serif;font-size:13px;resize:vertical;color:var(--text);background:rgba(255,255,255,.8)}
.config-textarea textarea:focus{outline:none;border-color:var(--accent)}

/* BOUTON VALIDER CONFIG */
.config-validate{margin-top:16px;text-align:right}
.btn-validate{padding:12px 32px;border-radius:14px;border:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:700;font-family:'Lato',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 6px 20px rgba(184,115,51,.25)}
.btn-validate:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(184,115,51,.35)}

/* RECAP */
.recap-section{padding:28px 36px}
.recap-client{margin-bottom:20px}
.recap-client label{font-size:13px;font-weight:700;color:var(--text);display:block;margin-bottom:6px}
.recap-client input{width:100%;max-width:400px;padding:12px 16px;border:1px solid var(--line);border-radius:12px;font-family:'Lato',sans-serif;font-size:15px;color:var(--text);background:rgba(255,255,255,.8)}
.recap-client input:focus{outline:none;border-color:var(--accent)}
.recap-empty{color:var(--muted);font-size:14px;font-style:italic;padding:20px 0}
.recap-cards{display:flex;flex-direction:column;gap:12px}
.recap-card{background:rgba(255,255,255,.85);border:1px solid var(--line);border-radius:16px;padding:18px 20px;overflow:hidden}
.recap-card h3{margin:0 0 10px;font-size:18px;color:var(--text);font-family:'Cormorant Garamond',serif;font-weight:700;display:flex;align-items:center;gap:8px}
.recap-card h3 .rc-icon{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;font-weight:700}
.recap-items{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.recap-item{font-size:13px;color:var(--text);display:flex;gap:6px}
.recap-item .ri-label{color:var(--muted);min-width:120px}
.recap-item .ri-value{font-weight:700}
.recap-card .recap-remove{float:right;background:none;border:none;color:#c0392b;font-size:11px;cursor:pointer;font-weight:700;font-family:'Lato',sans-serif}
.recap-card .recap-remove:hover{text-decoration:underline}
.recap-actions{margin-top:24px;display:flex;gap:12px;justify-content:flex-end}
.btn-pdf{padding:14px 36px;border-radius:14px;border:0;background:linear-gradient(135deg,#2c3e50,#34495e);color:#fff;font-size:15px;font-weight:700;font-family:'Lato',sans-serif;cursor:pointer;transition:all .3s;box-shadow:0 6px 20px rgba(0,0,0,.2)}
.btn-pdf:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.3)}

/* PHOTOS CLIENT */
.recap-photos{margin-top:18px}
.recap-photos label{font-size:13px;font-weight:700;color:var(--text);display:block;margin-bottom:8px}
.photos-grid{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start}
.photo-thumb{width:100px;height:100px;border-radius:12px;object-fit:cover;border:1px solid var(--line);cursor:zoom-in;transition:transform .3s}
.photo-thumb:hover{transform:scale(1.05)}
.photo-add{width:100px;height:100px;border-radius:12px;border:2px dashed var(--accent);background:rgba(184,115,51,.05);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;gap:4px}
.photo-add:hover{background:rgba(184,115,51,.12);border-color:var(--accent2)}
.photo-add svg{width:28px;height:28px;stroke:var(--accent);fill:none;stroke-width:1.5}
.photo-add span{font-size:10px;color:var(--accent);font-weight:700}
.photo-remove{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#c0392b;color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.photo-wrap{position:relative;display:inline-block}
.config-single{max-height:0;overflow:hidden;transition:max-height .5s;display:grid;grid-template-columns:1fr 200px;gap:16px;align-items:center;margin-top:0}
.config-step.open .config-single{max-height:400px;margin-top:14px}
.config-single-text p{margin:0;font-size:13px;color:#5a5047;line-height:1.5}
.config-single-img img{width:100%;height:140px;object-fit:cover;border-radius:12px;border:1px solid var(--line);cursor:zoom-in;transition:transform .3s}
.config-single-img img:hover{transform:scale(1.03)}
.config-thumbs{display:flex;gap:4px;border-left:1px solid var(--line);overflow:hidden;border-radius:0 16px 16px 0}
.config-thumbs img{width:110px;height:100%;min-height:90px;object-fit:cover;display:block;cursor:zoom-in;transition:transform .3s;filter:brightness(.95)}
.config-thumbs img:hover{filter:brightness(1.05);transform:scale(1.03)}
.config-step.has-many-images .config-thumbs img{width:90px}
.config-opt-label{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.config-thumb-wrap{position:relative;display:flex;flex-direction:column}
.config-thumb-caption{background:rgba(0,0,0,.04);text-align:center;padding:4px 6px;font-size:10px;color:var(--muted);font-weight:600;border-top:1px solid var(--line)}
.tag{display:inline-block;margin-top:4px;padding:3px 7px;border-radius:999px;background:#f7e7c7;color:var(--accent-dark);font-size:10px;font-weight:700}
.matcard-sm .mat-detail{max-height:0;overflow:hidden;transition:max-height .4s;font-size:11px;color:var(--muted);line-height:1.45}
.matcard-sm.open .mat-detail{max-height:200px;margin-top:6px}

/* PROCESS GRID (style capture) */
.process-grid{grid-template-rows:auto 1fr}
.proc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:0 36px 32px}
.proc-card{background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:20px;padding:24px 20px;text-align:center;cursor:pointer;transition:all .3s;overflow:hidden}
.proc-card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(34,25,19,.08);background:rgba(255,255,255,.95)}
.proc-card.open{background:rgba(255,255,255,.95);box-shadow:0 12px 28px rgba(34,25,19,.08)}
.proc-icon{width:56px;height:56px;border-radius:50%;background:#f3ebe0;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.proc-icon svg{width:24px;height:24px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.proc-num{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:6px}

/* WHYUS */
.whyus-full{grid-template-rows:auto 1fr}

.whygrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 36px 24px}
.whycard{background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:16px;padding:18px 20px;cursor:pointer;transition:all .3s;overflow:hidden;display:flex;gap:16px;align-items:flex-start}
.whycard:hover{background:rgba(255,255,255,.98);transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,25,19,.08)}
.whycard .why-icon{min-width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.whycard .why-icon svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.whycard .why-body h3{margin:0 0 4px;font-size:15.5px;color:var(--text);font-family:'Cormorant Garamond',serif;font-weight:700}
.whycard .why-body p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.45}
.whycard .why-detail{max-height:0;overflow:hidden;transition:max-height .4s;font-size:12px;color:#5a5047;line-height:1.5;margin-top:0;border-top:0 solid var(--line)}
.whycard.open .why-detail{max-height:200px;margin-top:8px;padding-top:8px;border-top-width:1px}
.whycard .why-hint{font-size:10px;color:var(--accent);margin-top:6px;font-weight:700}
.whycard.open .why-hint{display:none}

.install-steps{display:flex;gap:8px}
.install-step{flex:1;background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center;transition:all .3s;cursor:pointer;position:relative}
.install-step:hover{background:rgba(255,255,255,.95);transform:translateY(-2px);box-shadow:0 6px 16px rgba(34,25,19,.06)}
.install-step .step-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-bottom:6px}
.install-step .step-label{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.3}
.install-step .step-text{font-size:10.5px;color:var(--muted);line-height:1.4;margin-top:4px}

.install-step .step-imgs img:hover{transform:scale(1.1)}
.install-step .step-imgs .step-img-label{font-size:9px;color:var(--muted);text-align:center;margin-top:2px}
.install-step .step-img-wrap{display:flex;flex-direction:column;align-items:center}

.guarantee-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 36px 32px}

.actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;color:#d6d0c7}
.actionbtns{display:flex;gap:8px}
.btn{border:0;border-radius:12px;padding:11px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif;transition:all .2s}
.prev{background:#211b16;color:#fff}
.prev:hover{background:#2e261f}
.next{background:linear-gradient(180deg,var(--accent2),var(--accent));color:#20170f;box-shadow:0 6px 16px rgba(184,115,51,.2)}
.next:hover{box-shadow:0 10px 24px rgba(184,115,51,.3)}
.counter{font-size:12px}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(8,8,8,.9);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;backdrop-filter:blur(6px)}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:14px;box-shadow:0 16px 40px rgba(0,0,0,.4);background:#f7f1e8}
.lightbox-close{position:absolute;top:14px;right:14px;width:44px;height:44px;border-radius:999px;border:0;background:white;color:#1d1712;font-weight:800;font-size:17px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:999px;border:0;background:rgba(255,255,255,.1);color:#fff;font-size:1.4rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .3s}
.lb-nav:hover{background:rgba(255,255,255,.22)}
.lb-prev{left:16px}
.lb-next{right:16px}
.lb-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px}

/* RESPONSIVE */
@media(max-width:1100px){
  .layout{grid-template-columns:1fr}

  .whygrid{grid-template-columns:1fr 1fr}
  .proc-grid{grid-template-columns:1fr 1fr}
  .matgrid-inline{grid-template-columns:repeat(3,1fr)}
  .config-thumbs img{width:85px}
  .metiers4-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:760px){

  .title{font-size:28px}.hero .content{padding:20px}.hero .content .title{font-size:34px}

  .config-thumbs{border-left:0;border-top:1px solid var(--line);border-radius:0 0 16px 16px}
  .config-thumbs img{width:auto;height:100px;flex:1}
  .proc-grid{grid-template-columns:1fr}
}

function selectOpt(product,stepIdx,optIdx,el){
  var parent=el.parentNode;
  var opts=parent.querySelectorAll('.config-opt');
  opts.forEach(function(o){o.classList.remove('selected')});
  el.classList.add('selected');
  if(!projectData[product])projectData[product]={};
  var s=slides.find(function(sl){return sl.id===product});
  projectData[product][s.config[stepIdx].label]=s.config[stepIdx].options[optIdx].name;
}

function selectToggle(product,stepIdx,val,el){
  var btns=el.parentNode.querySelectorAll('.toggle-btn');
  btns.forEach(function(b){b.classList.remove('selected')});
  el.classList.add('selected');
  if(!projectData[product])projectData[product]={};
  var s=slides.find(function(sl){return sl.id===product});
  projectData[product][s.config[stepIdx].label]=val;
}

function validateConfig(product){
  var s=slides.find(function(sl){return sl.id===product});
  if(!projectData[product])projectData[product]={};
  // Récupérer les champs texte
  s.config.forEach(function(step){
    if(step.type==='text'){
      var ta=document.getElementById('config-text-'+product);
      if(ta&&ta.value)projectData[product][step.label]=ta.value;
    }
  });
  // Trouver la slide suivante et naviguer
  var curIdx=slides.indexOf(s);
  if(curIdx<slides.length-1){
    index=curIdx+1;
    renderSlide();
    renderSidebar();
  }
  // Feedback visuel
  alert('Configuration '+s.title+' enregistrée !');
}

function removeConfig(product){
  saveRecapFields();
  delete projectData[product];
  renderSlide();
  restoreRecapFields();
}

function saveRecapFields(){
  var cn=document.getElementById('client-name');
  var pn=document.getElementById('project-notes');
  if(cn)savedClientName=cn.value;
  if(pn)savedNotes=pn.value;
}
function restoreRecapFields(){
  var cn=document.getElementById('client-name');
  var pn=document.getElementById('project-notes');
  if(cn)cn.value=savedClientName;
  if(pn)pn.value=savedNotes;
}

function addPhoto(input){
  if(!input.files||!input.files[0])return;
  saveRecapFields();
  var reader=new FileReader();
  reader.onload=function(ev){
    projectPhotos.push(ev.target.result);
    renderSlide();
    restoreRecapFields();
  };
  reader.readAsDataURL(input.files[0]);
}

function removePhoto(idx){
  saveRecapFields();
  projectPhotos.splice(idx,1);
  renderSlide();
  restoreRecapFields();
}

function generatePDF(){
  var clientName=document.getElementById('client-name')?document.getElementById('client-name').value:'';
  if(!clientName){alert('Veuillez saisir le nom du client.');return;}
  var jsPDF=window.jspdf.jsPDF;
  var doc=new jsPDF();
  var y=15;
  var pageW=210,margin=15,contentW=pageW-margin*2;
  var today=new Date();
  var accentR=184,accentG=115,accentB=51;

  function checkPage(need){if(y+need>280){doc.addPage();y=15;}}
  function drawLine(){doc.setDrawColor(accentR,accentG,accentB);doc.setLineWidth(0.4);doc.line(margin,y,pageW-margin,y);y+=6;}
  function sectionTitle(txt){
    checkPage(14);
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.setTextColor(accentR,accentG,accentB);
    doc.text(txt,margin,y);doc.setTextColor(0,0,0);y+=7;
  }

  // === EN-TÊTE ===
  doc.setFillColor(30,25,20);
  doc.rect(0,0,pageW,38,'F');
  doc.setFontSize(20);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('La Planète Bois',margin,18);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(200,190,175);
  doc.text('SAS DomeBulle — Villeneuve-Saint-Germain — 02600',margin,25);
  doc.text('06 47 61 69 19 — laplanetebois@gmail.com',margin,30);
  doc.setFontSize(9);doc.setTextColor(accentR,accentG,accentB);
  doc.text('Fiche projet',pageW-margin,18,{align:'right'});
  doc.setTextColor(200,190,175);
  doc.text(today.toLocaleDateString('fr-FR'),pageW-margin,25,{align:'right'});
  doc.setTextColor(0,0,0);
  y=46;

  // === CLIENT ===
  doc.setFillColor(245,240,232);
  doc.roundedRect(margin,y,contentW,14,3,3,'F');
  doc.setFontSize(12);doc.setFont('helvetica','bold');
  doc.text('Client :  '+clientName,margin+6,y+9);
  y+=22;

  // === CONFIGURATIONS ===
  var products=['terrasses','pergolas','carports','surmesure'];
  var productNames={terrasses:'Terrasse',pergolas:'Pergola',carports:'Carport',surmesure:'Sur mesure'};
  var productIcons={terrasses:'T',pergolas:'P',carports:'C',surmesure:'S'};
  var hasData=false;

  products.forEach(function(p){
    if(projectData[p]&&Object.keys(projectData[p]).length>0){
      hasData=true;
      var keys=Object.keys(projectData[p]);
      checkPage(12+keys.length*7);
      // Titre produit avec pastille
      doc.setFillColor(accentR,accentG,accentB);
      doc.circle(margin+4,y-1,4,'F');
      doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
      doc.text(productIcons[p],margin+4,y+0.5,{align:'center'});
      doc.setTextColor(0,0,0);
      doc.setFontSize(13);doc.setFont('helvetica','bold');
      doc.text(productNames[p],margin+12,y);
      y+=7;
      // Ligne sous titre
      doc.setDrawColor(230,220,205);doc.setLineWidth(0.3);
      doc.line(margin,y,pageW-margin,y);y+=5;
      // Items en 2 colonnes
      doc.setFontSize(10);
      var col=0;
      keys.forEach(function(key){
        checkPage(8);
        var x=margin+(col===0?4:contentW/2+4);
        doc.setFont('helvetica','normal');doc.setTextColor(120,110,100);
        doc.text(key,x,y);
        doc.setFont('helvetica','bold');doc.setTextColor(30,25,20);
        doc.text(projectData[p][key],x+doc.getTextWidth(key)+3,y);
        col++;
        if(col>=2){col=0;y+=6.5;}
      });
      if(col!==0)y+=6.5;
      y+=4;
    }
  });

  if(!hasData){alert('Aucune configuration validée.');return;}

  // === NOTES ===
  var notes=document.getElementById('project-notes')?document.getElementById('project-notes').value:'';
  if(notes){
    checkPage(20);
    drawLine();
    sectionTitle('Notes');
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(60,55,50);
    var splitNotes=doc.splitTextToSize(notes,contentW-10);
    checkPage(splitNotes.length*5+4);
    doc.text(splitNotes,margin+4,y);
    y+=splitNotes.length*5+6;
  }

  // === PHOTOS ===
  if(projectPhotos.length>0){
    checkPage(20);
    drawLine();
    sectionTitle('Photos du terrain');
    var contentW=pageW-margin*2;
    projectPhotos.forEach(function(ph){
      try{
        var img=new Image();img.src=ph;
        var ratio=img.width/img.height;
        var drawW=contentW,drawH=contentW/ratio;
        if(drawH>180){drawH=180;drawW=180*ratio;}
        checkPage(drawH+12);
        var offX=(contentW-drawW)/2;
        doc.setDrawColor(220,215,205);doc.setLineWidth(0.3);
        doc.roundedRect(margin+offX-1,y-1,drawW+2,drawH+2,2,2,'S');
        doc.addImage(ph,'JPEG',margin+offX,y,drawW,drawH);
      y+=drawH+8;
      }catch(err){}
    });
  }

  // === PIED DE PAGE ===
  checkPage(16);
  y+=4;
  drawLine();
  doc.setFontSize(8);doc.setTextColor(160,155,145);
  doc.text('La Planète Bois — Présentation commerciale — '+today.toLocaleDateString('fr-FR'),105,y,{align:'center'});

  // Sauvegarder
  var fileName='Projet_'+clientName.replace(/[^a-zA-Z0-9]/g,'_')+'_'+today.toISOString().slice(0,10)+'.pdf';
  doc.save(fileName);
}

  if(s.layout==='process-grid'){

    s.steps.map(function(st){return'<div class="proc-card" onclick="this.classList.toggle(\'open\')"><div class="proc-icon">'+ICONS[st.icon]+'</div><div class="proc-num">'+e(st.num)+'</div><h3>'+e(st.label)+'</h3><p>'+e(st.text)+'</p><div class="proc-detail">'+e(st.detail)+'</div></div>'}).join('')+

    html='<div class="slide gallery4"><div class="recap-section"><div class="eyebrow">'+e(s.eyebrow)+'</div><div class="title">'+e(s.slideTitle)+'</div><div class="subtitle">'+e(s.subtitle)+'</div>'+
    '<div class="recap-client" style="margin-top:18px"><label>Nom du client</label><input type="text" id="client-name" placeholder="Ex: M. Dupont"></div>'+
    '<div class="recap-cards">'+recapCards+'</div>'+

    (projectPhotos.map(function(ph,i){return'<div class="photo-wrap"><img class="photo-thumb" src="'+ph+'" onclick="openSingleLB(this.src)"><button class="photo-remove" onclick="removePhoto('+i+')">✕</button></div>'}).join(''))+

// NAV
function goTo(i){index=i;renderSidebar();renderSlide();window.scrollTo({top:0,behavior:'smooth'})}
function prevSlide(){if(index>0)goTo(index-1)}
function nextSlide(){if(index<slides.length-1)goTo(index+1)}

// LIGHTBOX
function openLightbox(src){
  var s=slides[index];
  if(s.images&&s.images.length>1){lbImages=s.images.map(encodeURI)}
  else{lbImages=[src]}
  lbIdx=lbImages.indexOf(src);if(lbIdx<0)lbIdx=0;
  showLB();
}
function openSingleLB(src){
  lbImages=[src];lbIdx=0;showLB();
}
function openEssenceLB(src){
  var s=slides[index];
  if(s.materials){lbImages=s.materials.map(function(m){return encodeURI(m.image)})}
  else{lbImages=[src]}
  lbIdx=lbImages.indexOf(src);if(lbIdx<0)lbIdx=0;
  showLB();
}
function showLB(){
  document.getElementById('lbImg').src=lbImages[lbIdx];
  document.getElementById('lbCounter').textContent=lbImages.length>1?(lbIdx+1)+' / '+lbImages.length:'';
  document.querySelector('.lb-prev').style.display=lbImages.length>1?'':'none';
  document.querySelector('.lb-next').style.display=lbImages.length>1?'':'none';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(ev){
  if(!ev)return;
  var t=ev.target;
  if(t.id==='lbImg')return;
  if(t.classList.contains('lb-nav')||t.classList.contains('lb-prev')||t.classList.contains('lb-next'))return;
  document.getElementById('lightbox').classList.remove('open');
}
function lbNav(dir,ev){
  ev.stopPropagation();
  lbIdx=(lbIdx+dir+lbImages.length)%lbImages.length;
  document.getElementById('lbImg').src=lbImages[lbIdx];
  document.getElementById('lbCounter').textContent=(lbIdx+1)+' / '+lbImages.length;
}

// COPY
function copyText(text,el){
  navigator.clipboard.writeText(text).then(function(){
    var sp=el.querySelector('span[style]');
    if(sp){var o=sp.textContent;sp.textContent='✓ Copié !';sp.style.color='var(--accent)';setTimeout(function(){sp.textContent=o;sp.style.color=''},2000)}
  }).catch(function(){});
}

// KEYBOARD
window.addEventListener('keydown',function(ev){
  if(document.getElementById('lightbox').classList.contains('open')){
    if(ev.key==='Escape')closeLightbox(ev);
    if(ev.key==='ArrowLeft')lbNav(-1,ev);
    if(ev.key==='ArrowRight')lbNav(1,ev);
    return;
  }
  var tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(ev.key==='ArrowRight'||ev.key===' ')nextSlide();
  if(ev.key==='ArrowLeft')prevSlide();
});

renderSidebar();renderSlide();
</script>
